<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <meta cha rset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="stylesheet" href="./styles/index.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  
  <title>Travelgram</title>
</head>
<body>
  <header>
    <div class="container py-bs flex itemscenter">
      <img src="./assets/logo.svg" class="logo-img px-xl" alt="Logo">
      
      <div class="flex itemscenter gap-1">
        <div class="search-img"></div>
        <p class="desktop-only hover">Explorar</p>
        <p class="desktop-only hover">Minhas viagens</p>
        <img src="./assets/profile-img.png" class="profile-img" alt="Imagem de perfil">
      </div>
    </div>
  </header>

  <section id="profile">
    <div class="container px-xl py-lg section-info">

      <div class="profile-info">
        <img src="./assets/profile-img.png" id="profile-img" alt="Imagem de perfil">

        <div class="py-bs">
          <h1>Victor Castro</h1>
          <p>
            Amante de viagens, cultura e 
            gastronomia. 🌍✈️ <br>
            Aqui compartilho as histórias registradas em cada clique, explorando cantos fascinantes do nosso planeta a partir da movimentada cidade de Fortaleza.🏙️📸
          </p>
        </div>
      </div>

      <ul class="grid gap-1">

        <li>
          <img src="./assets/icons/map-icon.svg" alt="Ícone de mapa">
          <span>Fortaleza, Brasil</span>
        </li>

        <li>
          <img src="./assets/icons/airplane-icon.svg" alt="Ícone de avião">
          <span>37 países</span>
        </li>

        <li>
          <img src="./assets/icons/photo-icon.svg" alt="Ícone de foto">
          <span>240 fotos</span>
        </li>

      </ul>

    </div>
  </section>

  <section id="main">
    <div class="container main py-bs">
      <img src="./assets/imgs/img-1.jpg" id="main-img" alt="Imagem 1">
      <img src="./assets/imgs/img-2.jpg" id="main-img" alt="Imagem 2">
      <img src="./assets/imgs/img-3.jpg" id="main-img" alt="Imagem 3">
      <img src="./assets/imgs/img-4.jpg" id="main-img" alt="Imagem 4">
      <img src="./assets/imgs/img-5.jpg" id="main-img" alt="Imagem 5">
      <img src="./assets/imgs/img-6.jpg" id="main-img" alt="Imagem 6">
      <img src="./assets/imgs/img-7.jpg" id="main-img" alt="Imagem 7">
      <img src="./assets/imgs/img-8.jpg" id="main-img" alt="Imagem 8">
      <img src="./assets/imgs/img-9.jpg" id="main-img" alt="Imagem 9">
      <img src="./assets/imgs/img-10.jpg" id="main-img" alt="Imagem 10">
      <img src="./assets/imgs/img-11.jpg" id="main-img" alt="Imagem 11">
      <img src="./assets/imgs/img-12.jpg" id="main-img" alt="Imagem 12">

    </div>
  </section>


</body>
</html>
